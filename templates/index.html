<!DOCTYPE html>
<html>
<head>
    <title>AI Multi-Agent System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ai-response {
            margin-top: 25px;
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            line-height: 1.6;
        }

        .products-grid {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            padding: 18px;
            color: #333;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-title {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .sku {
            font-size: 12px;
            color: #666;
        }

        .price {
            margin-top: 12px;
            font-weight: bold;
            color: #0072ff;
            font-size: 15px;
        }

        .error {
            color: #ffcccc;
        }
    </style>
</head>
<body>

<div class="container">
<div class="card">

    <h1>🚀 AI Multi-Agent</h1>

    <input type="text" id="user_input" placeholder="Search product or ask AI..." />

    <select id="agent_type">
        <option value="parallel">Parallel Agent</option>
        <option value="sequential">Sequential Agent</option>
        <option value="loop">Loop Agent</option>
    </select>

    <button onclick="runAgent()">Run Agent</button>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Processing...</p>
    </div>

    <div id="aiResponse" class="ai-response" style="display:none;"></div>

    <div id="products" class="products-grid"></div>

</div>
</div>

<script>
async function runAgent() {

    const input = document.getElementById("user_input").value;
    const type = document.getElementById("agent_type").value;
    const loader = document.getElementById("loader");
    const aiResponse = document.getElementById("aiResponse");
    const productsDiv = document.getElementById("products");

    if (!input) {
        aiResponse.innerHTML = "<span class='error'>Please enter a query.</span>";
        aiResponse.style.display = "block";
        return;
    }

    loader.style.display = "block";
    aiResponse.style.display = "none";
    productsDiv.innerHTML = "";

    try {

        const response = await fetch("/run", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: `user_input=${encodeURIComponent(input)}&agent_type=${type}`
        });

        const data = await response.json();
        loader.style.display = "none";

        // ---------------- AI RESPONSE ----------------
        if (data.llm && data.llm.output) {
            aiResponse.innerHTML = "<strong>AI Response:</strong><br><br>" + 
                                   data.llm.output.replace(/\n/g, "<br>");
            aiResponse.style.display = "block";
        }

        if (data.final_output && data.final_output.output) {
            aiResponse.innerHTML = "<strong>AI Response:</strong><br><br>" + 
                                   data.final_output.output.replace(/\n/g, "<br>");
            aiResponse.style.display = "block";
        }

        // ---------------- PRODUCTS ----------------
        let items = [];

        if (data.magento &&
            data.magento.data &&
            data.magento.data.products &&
            data.magento.data.products.items) {

            items = data.magento.data.products.items;
        }

        if (items.length > 0) {

            items.forEach(product => {

                const priceObj = product.price_range?.minimum_price?.regular_price;
                const price = priceObj?.value || "";
                const currency = priceObj?.currency || "";

                const card = `
                    <div class="product-card">
                        <div class="product-title">${product.name}</div>
                        <div class="sku">SKU: ${product.sku}</div>
                        <div class="price">${price} ${currency}</div>
                    </div>
                `;

                productsDiv.innerHTML += card;
            });
        }

    } catch (err) {
        loader.style.display = "none";
        aiResponse.innerHTML = "<span class='error'>Server error. Try again.</span>";
        aiResponse.style.display = "block";
    }
}
</script>

</body>
</html>
